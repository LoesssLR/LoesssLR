<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 40" width="100%" height="40" style="background: transparent;">
  <defs>
    <!-- Glowing filters for tech aesthetics -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Laser sweep gradient -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0" />
      <stop offset="40%" stop-color="#39FF14" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#39FF14" stop-opacity="1" />
      <stop offset="60%" stop-color="#39FF14" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0" />
    </linearGradient>

    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes flow-left {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 120; }
      }
      @keyframes flow-right {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -120; }
      }
      @keyframes rotate-clockwise {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rotate-counter {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }
      @keyframes laserSweep {
        0% { transform: translateX(-150px); }
        40%, 100% { transform: translateX(1150px); }
      }
      .glow-effect {
        filter: url(#glow);
      }
      .glow-strong-effect {
        filter: url(#glow-strong);
      }
      .flow-l {
        animation: flow-left 6s linear infinite;
      }
      .flow-r {
        animation: flow-right 6s linear infinite;
      }
      .pulse-slow {
        animation: pulse 3s ease-in-out infinite;
      }
      .pulse-fast {
        animation: pulse 1.5s ease-in-out infinite;
      }
      .cursor-blink {
        animation: blink 1.2s step-end infinite;
      }
      .rot-cw {
        animation: rotate-clockwise 12s linear infinite;
        transform-origin: 500px 20px;
      }
      .rot-ccw {
        animation: rotate-counter 8s linear infinite;
        transform-origin: 500px 20px;
      }
      .laser-sweep {
        animation: laserSweep 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
    </style>
  </defs>

  <!-- Left Side System (Static structure + flowing energy) -->
  <!-- Left Endpoint Tech Node -->
  <circle cx="20" cy="20" r="2.5" fill="#39FF14" class="glow-effect pulse-fast" />
  <line x1="20" y1="20" x2="35" y2="20" stroke="#39FF14" stroke-width="1.2" opacity="0.3" />
  <rect x="35" y="16.5" width="7" height="7" fill="none" stroke="#39FF14" stroke-width="1.2" class="glow-effect pulse-slow" />
  
  <!-- Left Main Line Base (Faded background) -->
  <line x1="42" y1="20" x2="445" y2="20" stroke="#39FF14" stroke-width="1.2" opacity="0.15" />
  
  <!-- Left Main Flowing Line (Tech dash-array) -->
  <line x1="42" y1="20" x2="445" y2="20" stroke="#39FF14" stroke-width="1.5" stroke-dasharray="15 30 5 10 40 20" fill="none" class="glow-effect flow-l" />

  <!-- Left Ticks & Dots -->
  <line x1="120" y1="17" x2="120" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="220" y1="17" x2="220" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="320" y1="17" x2="320" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="420" y1="17" x2="420" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  
  <rect x="95" y="19" width="2" height="2" fill="#39FF14" class="pulse-fast" />
  <rect x="195" y="19" width="2" height="2" fill="#39FF14" class="pulse-slow" />
  <rect x="295" y="19" width="2" height="2" fill="#39FF14" class="pulse-fast" />
  <rect x="395" y="19" width="2" height="2" fill="#39FF14" class="pulse-slow" />
  
  <!-- Left Wing Border -->
  <path d="M 439 15 L 444 20 L 439 25" fill="none" stroke="#39FF14" stroke-width="1.5" class="glow-effect pulse-slow" />

  <!-- Left Console Prompt -->
  <path d="M 458 15 L 464 20 L 458 25" fill="none" stroke="#39FF14" stroke-width="1.8" class="glow-effect" />
  <line x1="466" y1="24" x2="473" y2="24" stroke="#39FF14" stroke-width="2" class="glow-effect cursor-blink" />

  <!-- CENTER CYBER CORE -->
  <!-- Outer Hexagon -->
  <polygon points="500,2 515.6,11 515.6,29 500,38 484.4,29 484.4,11" fill="none" stroke="#39FF14" stroke-width="1.5" class="glow-effect pulse-slow" />
  
  <!-- Concentric Radar Circles -->
  <circle cx="500" cy="20" r="14" fill="none" stroke="#39FF14" stroke-width="1.2" stroke-dasharray="10 8" class="rot-cw" opacity="0.7" />
  <circle cx="500" cy="20" r="10" fill="none" stroke="#39FF14" stroke-width="1" stroke-dasharray="6 4" class="rot-ccw" opacity="0.8" />
  
  <!-- Glowing Center Dot -->
  <circle cx="500" cy="20" r="3" fill="#39FF14" class="glow-effect pulse-fast" />

  <!-- Right Console Prompt -->
  <path d="M 542 15 L 536 20 L 542 25 M 544 25 L 548 15 M 550 15 L 556 20 L 550 25" fill="none" stroke="#39FF14" stroke-width="1.5" class="glow-effect" />

  <!-- Right Side System (Static structure + flowing energy) -->
  <!-- Right Wing Border -->
  <path d="M 561 15 L 556 20 L 561 25" fill="none" stroke="#39FF14" stroke-width="1.5" class="glow-effect pulse-slow" />

  <!-- Right Main Line Base (Faded background) -->
  <line x1="555" y1="20" x2="958" y2="20" stroke="#39FF14" stroke-width="1.2" opacity="0.15" />
  
  <!-- Right Main Flowing Line (Tech dash-array) -->
  <line x1="555" y1="20" x2="958" y2="20" stroke="#39FF14" stroke-width="1.5" stroke-dasharray="15 30 5 10 40 20" fill="none" class="glow-effect flow-r" />

  <!-- Right Ticks & Dots -->
  <line x1="580" y1="17" x2="580" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="680" y1="17" x2="680" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="780" y1="17" x2="780" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  <line x1="880" y1="17" x2="880" y2="23" stroke="#39FF14" stroke-width="1" opacity="0.4" />
  
  <rect x="605" y="19" width="2" height="2" fill="#39FF14" class="pulse-slow" />
  <rect x="705" y="19" width="2" height="2" fill="#39FF14" class="pulse-fast" />
  <rect x="805" y="19" width="2" height="2" fill="#39FF14" class="pulse-slow" />
  <rect x="905" y="19" width="2" height="2" fill="#39FF14" class="pulse-fast" />

  <!-- Right Endpoint Tech Node -->
  <rect x="958" y="16.5" width="7" height="7" fill="none" stroke="#39FF14" stroke-width="1.2" class="glow-effect pulse-slow" />
  <line x1="965" y1="20" x2="980" y2="20" stroke="#39FF14" stroke-width="1.2" opacity="0.3" />
  <circle cx="980" cy="20" r="2.5" fill="#39FF14" class="glow-effect pulse-fast" />

  <!-- Moving Laser Beam Scan -->
  <rect x="0" y="18" width="120" height="4" fill="url(#laserGrad)" class="glow-strong-effect laser-sweep" />
</svg>
